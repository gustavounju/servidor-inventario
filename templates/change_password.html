<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambiar Clave | Inventario GOLD</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-1: #082f49;
            --bg-2: #0f766e;
            --card: rgba(255, 255, 255, 0.95);
            --border: rgba(255, 255, 255, 0.3);
            --text: #0f172a;
            --muted: #475569;
            --accent: #d97706;
            --danger: #b91c1c;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(217, 119, 6, 0.15), transparent 34%),
                radial-gradient(circle at right, rgba(125, 211, 252, 0.1), transparent 28%),
                linear-gradient(135deg, var(--bg-1), var(--bg-2));
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .card {
            width: min(420px, 100%);
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 18px;
            box-shadow: 0 24px 80px rgba(15, 23, 42, 0.28);
            overflow: hidden;
        }

        .hero {
            padding: 28px 28px 16px;
            background: linear-gradient(135deg, #d97706, #92400e);
            color: #fff;
        }

        .hero h1 {
            margin: 0 0 8px;
            font-size: 1.6rem;
        }

        .hero p {
            margin: 0;
            opacity: 0.88;
            line-height: 1.5;
        }

        form {
            padding: 28px;
            display: grid;
            gap: 16px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.92rem;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid #cbd5e1;
            font: inherit;
        }

        input:focus {
            outline: 2px solid rgba(217, 119, 6, 0.18);
            border-color: var(--accent);
        }

        button {
            border: 0;
            border-radius: 12px;
            padding: 13px 16px;
            font: inherit;
            font-weight: 700;
            color: #fff;
            background: linear-gradient(135deg, #d97706, #92400e);
            cursor: pointer;
        }

        .error {
            margin: 0 28px;
            margin-top: 22px;
            padding: 12px 14px;
            border-radius: 12px;
            background: #fee2e2;
            color: var(--danger);
            font-size: 0.92rem;
            font-weight: 600;
        }

        .hint {
            color: var(--muted);
            font-size: 0.88rem;
            line-height: 1.5;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="hero">
            <h1>Cambio de Clave Obligatorio</h1>
            <p>Por seguridad, el administrador ha solicitado que establezcas una nueva contraseña para tu cuenta de <strong>{{ username }}</strong>.</p>
        </div>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        <form method="post" action="{{ url_for('auth.change_password') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div>
                <label for="new_password">Nueva Clave</label>
                <input id="new_password" name="new_password" type="password" required autofocus>
            </div>
            <div>
                <label for="confirm_password">Confirmar Nueva Clave</label>
                <input id="confirm_password" name="confirm_password" type="password" required>
            </div>
            <button type="submit">Actualizar y Entrar</button>
            <div class="hint">Una vez cambiada, podrás acceder a todos tus módulos habilitados.</div>
        </form>
    </div>
</body>
</html>
