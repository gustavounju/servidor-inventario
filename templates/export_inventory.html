<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Exportar Inventario | Inventario GOLD</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/static/css/gold.css">
    <style>
        .export-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }

        .category-card {
            border-radius: 20px;
            border: none;
            background: #fff;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            margin-bottom: 25px;
            overflow: hidden;
            transition: transform 0.2s;
        }

        .category-card:hover {
            transform: translateY(-5px);
        }

        .category-header {
            padding: 15px 20px;
            background: #f8fafc;
            border-bottom: 1px solid #f1f5f9;
            font-weight: 700;
            color: #1e293b;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .category-body {
            padding: 20px;
        }

        /* Modern Checkbox Style */
        .modern-checkbox {
            display: flex;
            align-items: center;
            padding: 10px 15px;
            border-radius: 12px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 10px;
        }

        .modern-checkbox:hover {
            background: #eff6ff;
            border-color: #3b82f6;
        }

        .modern-checkbox input {
            width: 20px;
            height: 20px;
            margin-right: 12px;
            cursor: pointer;
        }

        .modern-checkbox label {
            cursor: pointer;
            font-weight: 500;
            font-size: 0.9rem;
            color: #475569;
            margin: 0;
            flex-grow: 1;
        }

        .export-actions {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            position: sticky;
            bottom: 20px;
            box-shadow: 0 -10px 40px rgba(0, 0, 0, 0.1);
            z-index: 100;
        }

        .btn-gold-excel {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            border: none;
            color: white;
            padding: 12px 25px;
            border-radius: 12px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .btn-gold-pdf {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            border: none;
            color: white;
            padding: 12px 25px;
            border-radius: 12px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .btn-gold-excel:hover, .btn-gold-pdf:hover {
            opacity: 0.9;
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            color: white;
        }
    </style>
    <meta name="csrf-token" content="{{ csrf_token() }}">
</head>

<body class="has-fixed-header">
    {% include '_module_switcher.html' %}

    <div class="export-container" style="margin-top: 110px;">
        <!-- HERO HEADER PREMIUM -->
        <header class="hero-header mb-4" style="background: linear-gradient(135deg, #059669 0%, #10b981 100%);">
            <div class="row align-items-center">
                <div class="col-md-8">
                    <div class="d-flex align-items-center gap-3 mb-2">
                        <div style="width: 48px; height: 48px; background: rgba(255,255,255,0.1); border-radius: 14px; display: flex; align-items: center; justify-content: center; border: 1px solid rgba(255,255,255,0.15);">
                            <i class="bi bi-file-earmark-spreadsheet text-white fs-4"></i>
                        </div>
                        <div>
                            <h1 class="hero-title">Exportar Inventario</h1>
                            <p class="hero-subtitle">Genera reportes profesionales en Excel o PDF con filtros personalizados.</p>
                        </div>
                    </div>
                </div>
                <div class="col-md-4 text-md-end">
                    <div class="badge bg-white bg-opacity-10 py-2 px-3 border border-white border-opacity-10 mb-2">
                        <i class="bi bi-download me-1"></i> Formato .xlsx / .pdf
                    </div>
                </div>
            </div>
        </header>

        <form action="{{ url_for('dashboard.export_inventory') }}" method="post" id="exportForm">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="row">
                <!-- COLUMNA 1 -->
                <div class="col-md-6">
                    <!-- CATEGORIA 1: INFORMACION BASE -->
                    <div class="category-card">
                        <div class="category-header">
                            <i class="bi bi-info-circle-fill text-primary"></i> Información del Equipo
                        </div>
                        <div class="category-body">
                            <label class="modern-checkbox">
                                <input type="checkbox" name="campos" value="pc_name" checked>
                                <span>Nombre de PC</span>
                            </label>
                            <label class="modern-checkbox">
                                <input type="checkbox" name="campos" value="last_user" checked>
                                <span>Último Usuario</span>
                            </label>
                            <label class="modern-checkbox">
                                <input type="checkbox" name="campos" value="fuero" checked>
                                <span>Fuero / Dependencia</span>
                            </label>
                            <label class="modern-checkbox">
                                <input type="checkbox" name="campos" value="os_name" checked>
                                <span>Sistema Operativo</span>
                            </label>
                            <label class="modern-checkbox">
                                <input type="checkbox" name="campos" value="motherboard_model">
                                <span>Placa Madre</span>
                            </label>
                        </div>
                    </div>

                    <!-- CATEGORIA 2: RED E IMPRESORAS -->
                    <div class="category-card">
                        <div class="category-header">
                            <i class="bi bi-printer-fill text-secondary"></i> Red e Impresoras
                        </div>
                        <div class="category-body">
                            <label class="modern-checkbox">
                                <input type="checkbox" name="campos" value="ip_address" checked>
                                <span>Dirección IP</span>
                            </label>
                            <label class="modern-checkbox">
                                <input type="checkbox" name="campos" value="printer_model" checked>
                                <span>Modelo Impresora</span>
                            </label>
                            <label class="modern-checkbox">
                                <input type="checkbox" name="campos" value="printer_port">
                                <span>Puerto / Canal de Impresión</span>
                            </label>
                        </div>
                    </div>
                </div>

                <!-- COLUMNA 2 -->
                <div class="col-md-6">
                    <!-- CATEGORIA 3: HARDWARE -->
                    <div class="category-card">
                        <div class="category-header">
                            <i class="bi bi-cpu-fill text-info"></i> Hardware y Rendimiento
                        </div>
                        <div class="category-body">
                            <label class="modern-checkbox">
                                <input type="checkbox" name="campos" value="processor" checked>
                                <span>Procesador</span>
                            </label>
                            <label class="modern-checkbox">
                                <input type="checkbox" name="campos" value="ram_gb" checked>
                                <span>RAM Inicial (GB)</span>
                            </label>
                            <label class="modern-checkbox">
                                <input type="checkbox" name="campos" value="disk_models">
                                <span>Modelos de Almacenamiento</span>
                            </label>
                            <label class="modern-checkbox">
                                <input type="checkbox" name="campos" value="disk_speeds_rpm">
                                <span>Velocidad de Discos (RPM/SSD)</span>
                            </label>
                            <label class="modern-checkbox">
                                <input type="checkbox" name="campos" value="monitors">
                                <span>Monitores / Pantallas</span>
                            </label>
                        </div>
                    </div>

                    <!-- CATEGORIA 4: ALERTAS Y ESTADO -->
                    <div class="category-card">
                        <div class="category-header">
                            <i class="bi bi-exclamation-triangle-fill text-warning"></i> Estado y Auditoría
                        </div>
                        <div class="category-body">
                            <label class="modern-checkbox">
                                <input type="checkbox" name="campos" value="is_active" checked>
                                <span>Estado (Activa/Baja)</span>
                            </label>
                            <label class="modern-checkbox">
                                <input type="checkbox" name="campos" value="last_report">
                                <span>Última Sincronización</span>
                            </label>
                            <label class="modern-checkbox">
                                <input type="checkbox" name="campos" value="alerta_ram_baja">
                                <span>⚠️ Alerta: RAM Insuficiente</span>
                            </label>
                            <label class="modern-checkbox">
                                <input type="checkbox" name="campos" value="alerta_sin_impresora">
                                <span>⚠️ Alerta: Sin Impresora</span>
                            </label>
                        </div>
                    </div>
                </div>
            </div>

            <!-- BARRA DE ACCIONES FLOTANTE -->
            <div class="export-actions d-flex justify-content-between align-items-center">
                <a href="{{ url_for('dashboard.dashboard') }}" class="btn btn-link text-muted text-decoration-none fw-bold">
                    <i class="bi bi-arrow-left"></i> Volver al Dashboard
                </a>
                <div class="d-flex gap-3">
                    <button type="submit" class="btn btn-gold-excel">
                        <i class="bi bi-file-earmark-excel"></i> Descargar Excel (.xlsx)
                    </button>
                    <button type="button" class="btn btn-gold-pdf" onclick="submitPDF()">
                        <i class="bi bi-file-pdf"></i> Generar Reporte PDF
                    </button>
                </div>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function submitPDF() {
            const form = document.getElementById('exportForm');
            const originalAction = form.action;
            form.action = "{{ url_for('dashboard.export_inventory_pdf') }}";
            form.submit();
            setTimeout(() => {
                form.action = originalAction;
            }, 500);
        }
    </script>
</body>

</html>
