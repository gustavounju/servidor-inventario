<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Inventario</title>
    <link href="{{ url_for('static', filename='vendor/bootstrap/css/bootstrap.min.css') }}" rel="stylesheet">
    <script type="text/javascript" src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        body {
            background-color: #f8f9fa;
        }

        #reader {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }

        .result-card {
            display: none;
            margin-top: 20px;
        }
    </style>
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <script defer src="{{ url_for('static', filename='js/security.js') }}"></script>
</head>

<body class="p-3">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="mb-0">Scanner de Componentes</h4>
        <a href="/tecnicos" class="btn btn-outline-secondary btn-sm">Volver</a>
    </div>

    <!-- Scanner Section -->
    <div id="scanner-container">
        <div id="reader"
            style="width: 100%; border-radius: 8px; overflow: hidden; background: #000; min-height: 250px; position: relative;">
            <video id="video" style="width: 100%; height: 100%; object-fit: cover;"></video>
        </div>
        <div class="text-center mt-2 d-grid gap-2">
            <button id="startScan" class="btn btn-primary">Iniciar Cámara</button>
            <button id="stopScan" class="btn btn-danger d-none">Detener</button>

            <button class="btn btn-info text-white" onclick="document.getElementById('qr-input-file').click()">
                <i class="bi bi-camera-fill"></i> Tomar Foto (Mejor Enfoque)
            </button>
            <input type="file" id="qr-input-file" accept="image/*" capture="environment" style="display:none"
                onchange="scanFromFile(this)">

            <button class="btn btn-warning text-dark mt-2" onclick="openExternalScanner()">
                <i class="bi bi-phone-vibrate"></i> Usar App Externa (Recomendada)
            </button>

        </div>

        <div class="mt-3">
            <label class="form-label fw-bold">O ingresar manualmente:</label>
            <div class="input-group">
                <input type="text" id="manualInput" class="form-control" placeholder="Serial / Código...">
                <button class="btn btn-secondary" type="button" onclick="checkManual()">Buscar</button>
            </div>
            <p class="text-muted small mt-1">Puede usar una App externa y pegar el código aquí.</p>
        </div>
    </div>

    <!-- Result: New Component -->
    <div id="newComponentCard" class="card result-card shadow border-success">
        <div class="card-header bg-success text-white">Nuevo Componente Detectado</div>
        <div class="card-body">
            <h5 class="card-title" id="newSerialDisplay"></h5>
            <p class="card-text">Este ítem no está en el sistema. Regístrelo:</p>

            <form id="addComponentForm">
                <input type="hidden" id="newSerialInput">
                <div class="mb-2">
                    <label class="form-label">Tipo</label>
                    <select class="form-select" id="newType" required>
                        <option value="UPS">Equipo UPS</option>
                        <option value="Batería UPS">Batería UPS</option>
                        <option value="Fuente">Fuente de Poder</option>
                        <option value="Monitor">Monitor</option>
                        <option value="Teclado">Teclado</option>
                        <option value="Mouse">Mouse</option>
                        <option value="Disco">Disco Rígido/SSD</option>
                        <option value="Memoria">Memoria RAM</option>
                        <option value="Gabinete">Gabinete</option>
                        <option value="Otro">Otro (Especificar)</option>
                    </select>
                </div>
                <!-- Div Oculto para Tipo Personalizado -->
                <div class="mb-2 d-none" id="customTypeContainer">
                    <label class="form-label text-muted small">Especifique el tipo</label>
                    <input type="text" class="form-control" id="newTypeCustom" placeholder="Ej: Splitter, Extensor...">
                </div>
                <div class="mb-3">
                    <label class="form-label">Modelo / Marca</label>
                    <input type="text" class="form-control" id="newModel" placeholder="Ej: Sentey 600W" required>
                </div>
                <!-- Remito and Provider Section -->
                <div class="mb-3">
                    <label class="form-label">Negocio / Proveedor</label>
                    <input class="form-control" list="suppliersList" id="newSupplier"
                        placeholder="Busque o escriba uno nuevo..." autocomplete="off">
                    <datalist id="suppliersList">
                        <!-- Filled by JS -->
                    </datalist>
                </div>
                <div class="mb-3">
                    <label class="form-label">Remito / N° Factura</label>
                    <input type="text" class="form-control" id="newRemito" placeholder="Ej: 0001-00025267"
                        autocomplete="off">
                </div>

                <button type="submit" class="btn btn-success w-100">Agregar a Stock</button>
            </form>
        </div>
    </div>

    <!-- Result: Existing Component (In Stock) -->
    <div id="stockComponentCard" class="card result-card shadow border-primary">
        <div class="card-header bg-primary text-white">Componente en Stock</div>
        <div class="card-body">
            <h5 class="card-title" id="stockTypeDisplay"></h5>
            <h6 class="card-subtitle mb-2 text-muted" id="stockModelDisplay"></h6>
            <p class="small">S/N: <span id="stockSerialDisplay"></span></p>

            <hr>
            <p class="mb-2 fw-bold">Acciones:</p>
            <form id="assignComponentForm">
                <input type="hidden" id="assignSerialInput">
                <div class="mb-3">
                    <label class="form-label">Asignar a PC:</label>
                    <select class="form-select" id="assignPcSelect" required>
                        <option value="">Seleccione PC...</option>
                        <!-- Populated by JS -->
                    </select>
                </div>
                <button type="submit" class="btn btn-primary w-100">Instalar en PC</button>
            </form>
        </div>
    </div>

    <!-- Result: Existing Component (Installed) -->
    <div id="installedComponentCard" class="card result-card shadow border-warning">
        <div class="card-header bg-warning text-dark">Componente Instalado</div>
        <div class="card-body">
            <h5 class="card-title" id="instTypeDisplay"></h5>
            <h6 class="card-subtitle mb-2 text-muted" id="instModelDisplay"></h6>
            <p>Actualmente en: <strong id="instPcDisplay"></strong></p>
            <p class="small">S/N: <span id="instSerialDisplay"></span></p>

            <hr>
            <button id="btnReturnToStock" class="btn btn-outline-dark w-100">Devolver a Stock (Retirar)</button>
        </div>
    </div>

    <!-- Messages -->
    <div id="msgArea" class="alert d-none mt-3"></div>

    <script src="{{ url_for('static', filename='vendor/bootstrap/js/bootstrap.bundle.min.js') }}"></script>
    <script>
        let codeReader = null;
        let pcsList = [];

        window.addEventListener('load', function () {
            codeReader = new ZXing.BrowserMultiFormatReader();
        });



        // Load PCs on start
        fetch('/api/mobile/data')
            .then(res => res.json())
            .then(data => {
                pcsList = data.pcs || [];
                const sel = document.getElementById('assignPcSelect');
                pcsList.forEach(pc => {
                    let opt = document.createElement('option');
                    opt.value = pc.name;
                    opt.text = `${pc.name} - ${pc.user} - ${pc.area}`;
                    sel.appendChild(opt);
                });
            });

        // Check for return from External Scanner Intent
        document.addEventListener("DOMContentLoaded", () => {
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');
            if (code) {
                // Clear the query string
                window.history.replaceState({}, document.title, window.location.pathname);
                document.getElementById('manualInput').value = code;
                hideAllCards();
                checkComponent(code);
            }
        });

        // Load Suppliers on start
        fetch('/api/components/suppliers')
            .then(res => res.json())
            .then(suppliers => {
                const datalist = document.getElementById('suppliersList');
                suppliers.forEach(supp => {
                    if (supp) {
                        let opt = document.createElement('option');
                        opt.value = supp;
                        datalist.appendChild(opt);
                    }
                });
            })
            .catch(err => console.error("Error cargando proveedores:", err));

        function showMsg(text, type = 'success') {
            const el = document.getElementById('msgArea');
            el.className = `alert alert-${type} mt-3`;
            el.innerText = text;
            el.classList.remove('d-none');
            setTimeout(() => el.classList.add('d-none'), 3000);
        }

        function hideAllCards() {
            document.querySelectorAll('.result-card').forEach(c => c.style.display = 'none');
            document.getElementById('msgArea').classList.add('d-none');
        }

        function onScanSuccess(decodedText) {
            // Stop scanning to process
            if (codeReader) {
                codeReader.reset();
            }
            document.getElementById('startScan').classList.remove('d-none');
            document.getElementById('stopScan').classList.add('d-none');
            hideAllCards();
            checkComponent(decodedText);
        }

        document.getElementById('startScan').addEventListener('click', () => {
            hideAllCards();
            document.getElementById('startScan').classList.add('d-none');
            document.getElementById('stopScan').classList.remove('d-none');

            codeReader.getVideoInputDevices()
                .then((videoInputDevices) => {
                    if (videoInputDevices.length > 0) {
                        let selectedDeviceId = videoInputDevices[0].deviceId;
                        // Attempt to find back camera
                        const backCamera = videoInputDevices.find(device =>
                            device.label.toLowerCase().includes('back') ||
                            device.label.toLowerCase().includes('environment') ||
                            device.label.toLowerCase().includes('trasera')
                        );
                        if (backCamera) {
                            selectedDeviceId = backCamera.deviceId;
                        } else {
                            // Default to last camera on mobile
                            selectedDeviceId = videoInputDevices[videoInputDevices.length - 1].deviceId;
                        }

                        // Play video in the specified element
                        codeReader.decodeFromVideoDevice(selectedDeviceId, 'video', (result, err) => {
                            if (result) {
                                onScanSuccess(result.text);
                            }
                            if (err && !(err instanceof ZXing.NotFoundException)) {
                                console.error(err);
                            }
                        });
                    } else {
                        showMsg("No se encontraron cámaras", "danger");
                        document.getElementById('startScan').classList.remove('d-none');
                        document.getElementById('stopScan').classList.add('d-none');
                    }
                })
                .catch((err) => {
                    console.error(err);
                    showMsg("Error iniciando cámara: " + err, "danger");
                    document.getElementById('startScan').classList.remove('d-none');
                    document.getElementById('stopScan').classList.add('d-none');
                });
        });

        document.getElementById('stopScan').addEventListener('click', () => {
            if (codeReader) {
                codeReader.reset();
            }
            document.getElementById('startScan').classList.remove('d-none');
            document.getElementById('stopScan').classList.add('d-none');
        });

        function checkComponent(serial) {
            showMsg("Buscando serial: " + serial + "...", "info");

            fetch('/api/components/' + encodeURIComponent(serial))
                .then(res => res.json())
                .then(data => {
                    document.getElementById('msgArea').classList.add('d-none');

                    if (data.status === 'not_found') {
                        // Show New Component Form
                        document.getElementById('newComponentCard').style.display = 'block';
                        document.getElementById('newSerialDisplay').innerText = serial;
                        document.getElementById('newSerialInput').value = serial;
                    } else if (data.status === 'found') {
                        const c = data.data;
                        if (c.status === 'Stock' || c.status === 'Retirado') {
                            // Show Stock Card
                            document.getElementById('stockComponentCard').style.display = 'block';
                            document.getElementById('stockTypeDisplay').innerText = c.component_type;
                            document.getElementById('stockModelDisplay').innerText = c.brand_model;
                            document.getElementById('stockSerialDisplay').innerText = c.serial_number;
                            document.getElementById('assignSerialInput').value = c.serial_number;
                        } else {
                            // Show Installed Card
                            document.getElementById('installedComponentCard').style.display = 'block';
                            document.getElementById('instTypeDisplay').innerText = c.component_type;
                            document.getElementById('instModelDisplay').innerText = c.brand_model;
                            document.getElementById('instPcDisplay').innerText = c.assigned_pc;
                            document.getElementById('instSerialDisplay').innerText = c.serial_number;

                            // Setup Return Action
                            document.getElementById('btnReturnToStock').onclick = function () {
                                returnComponent(c.serial_number);
                            };
                        }
                    }
                })
                .catch(err => showMsg("Error API: " + err, "danger"));
        }

        // --- FORMS SUBMIT --- //

        // Add New
        document.getElementById('newType').addEventListener('change', function () {
            const customTypeContainer = document.getElementById('customTypeContainer');
            const customInput = document.getElementById('newTypeCustom');
            if (this.value === 'Otro') {
                customTypeContainer.classList.remove('d-none');
                customInput.setAttribute('required', 'required');
            } else {
                customTypeContainer.classList.add('d-none');
                customInput.removeAttribute('required');
                customInput.value = '';
            }
        });

        document.getElementById('addComponentForm').addEventListener('submit', (e) => {
            e.preventDefault();

            let finalType = document.getElementById('newType').value;
            if (finalType === 'Otro') {
                finalType = document.getElementById('newTypeCustom').value.trim();
                // Si el usuario no escribe nada, forzamos un valor por defecto o evitamos el error
                if (!finalType) finalType = "Otro";
            }

            const payload = {
                serial_number: document.getElementById('newSerialInput').value,
                component_type: finalType,
                brand_model: document.getElementById('newModel').value,
                supplier_name: document.getElementById('newSupplier').value,
                remito_number: document.getElementById('newRemito').value
            };

            fetch('/api/components/add', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            }).then(res => res.json()).then(d => {
                if (d.status === 'success') {
                    showMsg("Componente agregado a Stock!", "success");
                    document.getElementById('newComponentCard').style.display = 'none';
                } else showMsg("Error: " + d.message, "danger");
            });
        });

        // Assign
        document.getElementById('assignComponentForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const payload = {
                serial_number: document.getElementById('assignSerialInput').value,
                pc_name: document.getElementById('assignPcSelect').value
            };

            fetch('/api/components/assign', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            }).then(res => res.json()).then(d => {
                if (d.status === 'success') {
                    showMsg("Componente instalado correctamente!", "success");
                    document.getElementById('stockComponentCard').style.display = 'none';
                } else showMsg("Error: " + d.message, "danger");
            });
        });

        // Return
        function checkManual() {
            const val = document.getElementById('manualInput').value.trim();
            if (!val) return showMsg("Ingrese un código", "warning");
            hideAllCards();
            checkComponent(val);
        }

        function scanFromFile(input) {
            if (input.files.length === 0) return;
            const imageFile = input.files[0];

            showMsg("Procesando imagen...", "info");

            // Stop video if running
            if (codeReader) {
                codeReader.reset();
                document.getElementById('startScan').classList.remove('d-none');
                document.getElementById('stopScan').classList.add('d-none');
            }
            processFile(imageFile);
        }

        function processFile(file) {
            const imgUrl = URL.createObjectURL(file);
            const img = new Image();
            img.onload = () => {
                codeReader.decodeFromImageElement(img)
                    .then(result => {
                        document.getElementById('msgArea').classList.add('d-none');
                        onScanSuccess(result.text);
                        URL.revokeObjectURL(imgUrl);
                    })
                    .catch(err => {
                        console.error(err);
                        showMsg("No se pudo detectar un código en la foto. Intenta con una imagen más nítida.", "warning");
                        URL.revokeObjectURL(imgUrl);
                    })
                    .finally(() => {
                        document.getElementById('qr-input-file').value = "";
                    });
            };
            img.src = imgUrl;
        }

        function returnComponent(serial) {
            if (!confirm("¿Seguro que desea retirar este componente y devolverlo a stock?")) return;

            fetch('/api/components/return', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ serial_number: serial })
            }).then(res => res.json()).then(d => {
                if (d.status === 'success') {
                    showMsg("Componente devuelto a Stock!", "success");
                    document.getElementById('installedComponentCard').style.display = 'none';
                } else showMsg("Error: " + d.message, "danger");
            });
        }

        function openExternalScanner() {
            // URL to return back to this page with the scanned code
            const retUrl = encodeURIComponent(window.location.href.split('?')[0] + "?code={CODE}");
            // Usando Binary Eye (com.teacapps.barcodescanner) - 100% compatible con Callback Intent
            window.location.href = `intent://scan/?ret=${retUrl}#Intent;scheme=zxing;package=com.teacapps.barcodescanner;end`;
        }

    </script>
</body>

</html>
