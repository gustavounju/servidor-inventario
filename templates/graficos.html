<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Gráficos e Indicadores</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #f8fafc;
            --text-color: #0f172a;
            --card-bg: #fff;
            --primary-gradient: linear-gradient(135deg, #1e293b 0%, #334155 100%);
            --secondary-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --accent-color: #3b82f6;
            --border-color: #e2e8f0;
            --kpi-border-success: #10b981;
            --kpi-border-neutral: #64748b;
            --kpi-border-warning: #f59e0b;
            --kpi-shadow: rgba(30, 41, 59, 0.15);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding-top: 70px;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        .card-header {
            background: var(--bg-color);
            border-bottom: 1px solid var(--border-color);
            color: var(--text-color);
            font-weight: 600;
        }

        .kpi-box {
            padding: 10px;
            min-width: 135px;
        }

        /* Navbar */
        .navbar-brand {
            font-weight: 700;
        }

        .kpi-toggle {
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            height: 100%;
        }

        .kpi-toggle:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .kpi-on {
            background: var(--primary-gradient) !important;
            color: #fff !important;
        }

        /* Flexible Grid for KPIs */
        .kpi-container {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            /* Centrado equitativo */
        }

        .kpi-item {
            flex: 1 0 140px;
            /* Grow, don't shrink too much, base width 140px */
            max-width: 200px;
        }

        /* Charts Section */
        #chartsRow .card {
            border-radius: 16px;
            border: none;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
        }
    </style>
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <script defer src="/static/js/security.js"></script>
</head>

<body>
    {% include '_module_switcher.html' %}

    <main class="container-fluid" style="margin-top: 110px;">
        <h1 class="mb-4 text-center fw-bold"><i class="bi bi-graph-up text-primary me-2"></i>Análisis de Infraestructura</h1>

        <!-- Gráficos Principales -->
        <div class="row mb-5" id="chartsRow">
            <div class="col-md-4 mb-3">
                <div class="card shadow-sm h-100">
                    <div class="card-header bg-transparent border-0 font-weight-bold text-center">Distribución SO</div>
                    <div class="card-body d-flex align-items-center justify-content-center" style="min-height: 300px;">
                        <canvas id="osChart"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-md-4 mb-3">
                <div class="card shadow-sm h-100">
                    <div class="card-header bg-transparent border-0 font-weight-bold text-center">Tareas por Categoría
                    </div>
                    <div class="card-body d-flex align-items-center justify-content-center" style="min-height: 300px;">
                        <canvas id="catChart"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-md-4 mb-3">
                <div class="card shadow-sm h-100">
                    <div class="card-header bg-transparent border-0 font-weight-bold text-center">Alertas</div>
                    <div class="card-body d-flex align-items-center justify-content-center" style="min-height: 300px;">
                        <canvas id="alertsChart"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <!-- KPIs Cards -->
        <!-- Usamos un contenedor flex para distribución equitativa horizontal -->
        <!-- KPIs eliminados de aquí (están en Dashboard principal) -->


    </main>

    <script>
        // Charts Data
        const kpiWin7 = {{ kpi_win7 }};
        const kpiWin10 = {{ kpi_win10 }};
        const kpiTotal = {{ kpi_total_activas }};
        const kpiRam = {{ kpi_alerta_ram }};
        const kpiSinImp = {{ kpi_sin_impresora }};
        const kpiImpRed = {{ kpi_impresora_red }};

        const catLabels = {{ cat_labels | tojson }};
        const catValues = {{ cat_values | tojson }};

        // OS Chart
        new Chart(document.getElementById('osChart'), {
            type: 'doughnut',
            data: {
                labels: ['Win 7', 'Win 10/11', 'Otros'],
                datasets: [{
                    data: [kpiWin7, kpiWin10, Math.max(0, kpiTotal - (kpiWin7 + kpiWin10))],
                    backgroundColor: ['#dc3545', '#0d6efd', '#6c757d']
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });

        // Categories Chart
        new Chart(document.getElementById('catChart'), {
            type: 'bar',
            data: {
                labels: catLabels,
                datasets: [{
                    label: 'Tareas',
                    data: catValues,
                    backgroundColor: '#6366f1',
                    borderRadius: 4
                }]
            },
            options: {
                indexAxis: 'y',
                responsive: true,
                maintainAspectRatio: false,
                scales: { x: { beginAtZero: true, ticks: { precision: 0 } } }
            }
        });

        // Alerts Chart
        new Chart(document.getElementById('alertsChart'), {
            type: 'bar',
            data: {
                labels: ['RAM Baja', 'Sin Imp', 'Imp Red'],
                datasets: [{
                    label: 'Cantidad',
                    data: [kpiRam, kpiSinImp, kpiImpRed],
                    backgroundColor: ['#ffc107', '#0dcaf0', '#6610f2']
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } }
            }
        });


    </script>
</body>

</html>
